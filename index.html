<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXELUF - Portal Mod</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F4F4F5;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .card {
      background: white;
      border: 4px solid black;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 8px 8px 0 black;
    }
    h1 { font-size: 2.5rem; font-weight: 900; }
    .mod-item {
      border: 3px solid black;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      background: #fff;
      box-shadow: 5px 5px 0 black;
    }
    .mod-item img {
      max-width: 100%;
      border-radius: 12px;
      border: 3px solid black;
    }
    .tag {
      background: #B5FF3D;
      padding: 4px 10px;
      border-radius: 20px;
      border: 2px solid black;
      font-weight: bold;
      font-size: 12px;
      display: inline-block;
      margin-right: 6px;
    }
    .btn {
      background: #B5FF3D;
      border: 3px solid black;
      border-radius: 30px;
      padding: 10px 20px;
      font-weight: bold;
      display: inline-block;
      text-decoration: none;
      color: black;
      box-shadow: 4px 4px 0 black;
      transition: 0.1s ease;
    }
    .btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 black;
    }
    .search {
      width: 100%;
      padding: 12px 20px;
      border: 4px solid black;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-weight: bold;
    }
    .credit-badge {
      background: #B5FF3D;
      padding: 6px 14px;
      border-radius: 40px;
      border: 3px solid black;
      display: inline-block;
      margin: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 id="webTitle">AXELUF</h1>
      <p id="webSubtitle" style="background:#B5FF3D; display:inline-block; padding:4px 16px; border-radius:40px; border:3px solid black;">Link Mod Bersih</p>
    </div>

    <div class="card">
      <input type="text" id="searchBox" class="search" placeholder="Cari mod..." oninput="renderMods()" />
    </div>

    <div id="modContainer"></div>

    <div class="footer" id="footerCredits">
      <p>COPYRIGHT 2026 AXELUF</p>
    </div>
  </div>

  <script>
    let data = { links: [], credits: [], web_title: 'AXELUF', web_subtitle: 'Link Mod Bersih' };

    async function loadData() {
      try {
        const res = await fetch('/data-mod.json?' + Date.now());
        if (!res.ok) throw new Error('Gagal load data');
        data = await res.json();
        document.getElementById('webTitle').innerText = data.web_title || 'AXELUF';
        document.getElementById('webSubtitle').innerText = data.web_subtitle || 'Link Mod Bersih';
        renderCredits();
        renderMods();
      } catch (e) {
        document.getElementById('modContainer').innerHTML = '<p style="color:red;">Gagal memuat data. Pastikan file data-mod.json ada.</p>';
      }
    }

    function renderCredits() {
      const footer = document.getElementById('footerCredits');
      if (data.credits && data.credits.length) {
        let html = '<div style="margin-bottom:16px;">';
        data.credits.forEach(c => {
          html += `<a href="${c.url}" target="_blank" style="background:${c.color||'#B5FF3D'}; padding:6px 14px; border-radius:40px; border:3px solid black; display:inline-block; margin:4px; text-decoration:none; color:black; font-weight:bold;">${c.platform}: ${c.handle}</a>`;
        });
        html += '</div>';
        footer.innerHTML = html + '<p>COPYRIGHT 2026 AXELUF</p>';
      }
    }

    function renderMods() {
      const q = document.getElementById('searchBox').value.toLowerCase();
      const container = document.getElementById('modContainer');
      const links = data.links || [];
      const filtered = links.filter(item => 
        item.name.toLowerCase().includes(q) ||
        (item.tag && item.tag.toLowerCase().includes(q))
      );

      if (!filtered.length) {
        container.innerHTML = '<div class="card" style="text-align:center;">Mod tidak ditemukan.</div>';
        return;
      }

      let html = '';
      filtered.forEach(item => {
        const tags = (item.tag || '').split(',').map(t => t.trim()).filter(Boolean);
        let tagHtml = tags.map(t => `<span class="tag">#${t}</span>`).join('');

        html += `
          <div class="mod-item">
            ${item.image ? `<img src="${item.image}" alt="${item.name}" style="max-height:200px; width:100%; object-fit:cover; margin-bottom:12px;" />` : ''}
            <h2 style="font-size:1.6rem;">${item.name}</h2>
            <div style="margin:8px 0;">${tagHtml}</div>
            <p>${item.desc || ''}</p>
            <p><strong>Password:</strong> ${item.password || 'Tidak ada'}</p>
            <a href="${item.url}" target="_blank" class="btn" style="margin-top:12px;">⬇ Download</a>
            <div style="margin-top:8px; font-size:14px; color:#555;">👁 ${item.views||0} · ❤️ ${item.likes||0}</div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
